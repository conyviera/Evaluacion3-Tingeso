# ==========================================
# CONFIGURACIÓN DE BASE DE DATOS H2 (SOLO PARA TESTS)
# ==========================================

# 1. Conexión a Base de datos en Memoria
# 'mem:testdb' significa que la DB vive en la memoria RAM, no en un archivo.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# 2. Configuración de JPA / Hibernate
# Le decimos a Hibernate que hable el "idioma" de H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# 3. Estrategia de creación de tablas
# 'create-drop' crea las tablas al iniciar el test y las borra al terminar.
# Esto asegura que cada test empiece limpio.
spring.jpa.hibernate.ddl-auto=create-drop

# 4. Mostrar consultas SQL (Opcional: cámbialo a false si hace mucho ruido en el log)
spring.jpa.show-sql=true

# 5. Evita un error común de drivers con H2
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true